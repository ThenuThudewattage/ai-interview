version: "3.9"

services:
  # ── PostgreSQL with pgvector ───────────────────────────────
  postgres:
    image: pgvector/pgvector:pg16
    container_name: ai_interview_postgres
    environment:
      POSTGRES_USER: aiinterview
      POSTGRES_PASSWORD: aiinterview
      POSTGRES_DB: ai_interview
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/scripts/init_db.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U aiinterview -d ai_interview"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Redis ─────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: ai_interview_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --save 20 1 --loglevel warning
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Backend API ───────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: ai_interview_backend
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+asyncpg://aiinterview:aiinterview@postgres:5432/ai_interview
      REDIS_URL: redis://redis:6379/0
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
      - ./storage:/app/storage
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  # ── Frontend (served via ng serve) ───────────────────────
  frontend:
    image: node:20-alpine
    container_name: ai_interview_frontend
    working_dir: /app
    ports:
      - "4200:4200"
    volumes:
      - ./frontend:/app
    command: sh -c "npm install && npx ng serve --host 0.0.0.0 --poll 2000"
    depends_on:
      - backend

volumes:
  postgres_data:
  redis_data:
